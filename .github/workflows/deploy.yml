name: Deploy to GitHub Pages

on:
    push:
        branches: [main]
    workflow_dispatch:

permissions:
    contents: read
    pages: write
    id-token: write

concurrency:
    group: 'pages'

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: pnpm/action-setup@v4
              with:
                  version: 10
            - uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: 'pnpm'
            - run: pnpm install --frozen-lockfile
            - name: Determine base path
              id: base-path
              run: |
                  if [ "${{ github.repository }}" = "$(echo ${{ github.repository_owner }}.github.io)" ]; then
                      echo "base_path=" >> "$GITHUB_OUTPUT"
                  else
                      echo "base_path=/${{ github.event.repository.name }}" >> "$GITHUB_OUTPUT"
                  fi
            - name: Build with Next.js
              run: pnpm build
              env:
                  BASE_PATH: ${{ steps.base-path.outputs.base_path }}
            - name: Upload artifact
              uses: actions/upload-pages-artifact@v3
              with:
                  path: ./out

    deploy:
        needs: build
        runs-on: ubuntu-latest
        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}
        steps:
            - name: Deploy to GitHub Pages
              id: deployment
              uses: actions/deploy-pages@v4
